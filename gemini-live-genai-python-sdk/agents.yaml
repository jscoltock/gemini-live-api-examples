agents:
  info:
    description: General knowledge Q&A. Use as the default for any question or non-technical
      request that can be answered without a search.
    backend: ollama
    model: qwen3.5:9b-64K
    timeout: 120
    system_prompt: You are a helpful personal assistant. Be concise and practical.
      If you don't know something, say so. Prefer short answers over long ones.
    fallbacks:
    - backend: claude-code
      model: glm-5.1
      timeout: 60
  personal-assistant:
    description: "Do the stuff a personal assistant would do. You have access to these\
      \ tools:\n  playwright-cli · browser control\n  phone-call-message  uses Twilio\
      \ to make calls\n  gws-people  Google contacts\n  gws-sheets-read\n  gws-drive\n\
      \  gws-sheets-append\n  gws-calendar\n  gws-chat \n  gws-docs-write \n  gws-gmail\
      \ \n  gws-gmail-send"
    backend: claude-code
    model: glm-5.1
    timeout: 120
    system_prompt: You are a helpful personal assistant. Be concise and practical.
      If you don't know something, say so. Prefer short answers over long ones.
    fallbacks:
    - backend: ollama
      model: qwen3.5:9b-64K
      timeout: 120
  coder:
    description: 'Software engineering: writing features, debugging, refactoring,
      multi-file edits, git operations, running tests, project scaffolding. Full filesystem
      and shell access.

      '
    backend: claude-code
    model: glm-5.1
    timeout: 600
    system_prompt: 'You are a senior software engineer. Write clean, well-tested code.
      Prefer simple solutions over clever ones. Always explain your changes briefly
      before making them.

      '
    fallbacks:
    - backend: ollama
      model: qwen3.5:9b-64K
      timeout: 120
  architect:
    description: 'High-level software architecture decisions, system design, technology
      selection, code review, and planning.

      '
    backend: claude-code
    model: glm-5.1
    timeout: 600
    system_prompt: 'You are a software architect. Focus on system design, trade-offs,
      and long-term maintainability. Don''t write code unless asked — instead describe
      approaches, compare options, and recommend directions.

      '
    fallbacks:
    - backend: ollama
      model: qwen3.5:9b-64K
      timeout: 120
  local:
    description: Local Ollama agent with file and shell tool access. Good for quick
      file operations, running scripts, and light coding tasks that don't need a full
      cloud agent.
    backend: ollama
    model: qwen3.5:9b-64K
    timeout: 300
    system_prompt: You are a helpful assistant with access to filesystem, shell, email,
      calendar, contacts, Drive, Sheets, Docs, and Twilio (phone calls & SMS) tools.
      Use them to complete tasks efficiently. Be concise in your responses.
    tools:
    - bash
    - calendar_agenda
    - calendar_insert
    - docs_write
    - drive_list
    - drive_upload
    - edit_file
    - gmail_forward
    - gmail_read
    - gmail_reply
    - gmail_search
    - gmail_send
    - gmail_triage
    - grep_files
    - list_files
    - people_search
    - read_file
    - sheets_append
    - sheets_read
    - twilio_call
    - twilio_list_calls
    - twilio_list_messages
    - twilio_sms
    - web_extract_pages
    - web_search
    - web_search_news
    - write_file
    options:
      temperature: 0
      top_p: 0.85
      repeat_penalty: 1.15
    fallbacks:
    - backend: ollama
      model: gemma4:e4b-64K
      timeout: 120
