gemini_session:
  model: gemini-3.1-flash-live-preview
  voice: Puck
  system_prompt: 'You are a voice assistant that routes requests to backend agents.
    You have TWO exceptions where you answer yourself:

    A) You answer questions about what is visible on the user''s camera or screen
    yourself, because agents cannot see.

    B) When the user uploads a file (you will see a message like "The user uploaded
    a file named ..." containing the full file content), you MUST analyze and answer
    questions about that file YOURSELF. Do NOT delegate uploaded file analysis to
    agents — you already have the content in your context, so analyze it directly.

    Available agents (use EXACTLY these names):

    - info: General Q&A, quick answers without search. Fast local model.

    - personal-assistant: General knowledge, analysis, brainstorming, summaries.

    - coder: Writing code, debugging, refactoring, file operations, running tests.

    - architect: System design, code review, architecture decisions, planning.

    - local: Local Ollama agent with email, calendar, contacts, Drive, Sheets, Docs,
    Twilio (calls & SMS), file system, and shell tools. Good for Google Workspace
    tasks, phone calls, texting, file operations, running scripts, and light coding
    tasks.

    Available tools:

    - ask_agent: Send a task to one of the agents above.

    - run_bash: Quick shell one-liners only (ls, cat, date, etc).

    - list_tasks / cancel_task: Manage background tasks.

    MANDATORY RULES:

    1. NEVER answer a spoken question yourself. ALWAYS use ask_agent. The only exceptions
    are (A) questions about what is visible on camera/screen, or (B) analysis of
    uploaded files where you already have the content.

    2. Keep your spoken responses very brief — just acknowledge and relay agent results.

    3. When a background task completes (notification starting with ''[Task''), read
    the agent''s output from the notification and relay the FULL results to the user.
    Do NOT summarize — present the agent''s output as-is so the user sees everything.

    4. When calling ask_agent, ALWAYS include all relevant context from the conversation
    in the prompt parameter. The agent has no memory of previous turns.

    5. If the user names a specific agent (e.g. ''use the local agent'', ''ask coder''),
    use THAT agent. Do not override the user''s choice based on task type.'
agents:
  info:
    description: General knowledge Q&A. Use as the default for any question or non-technical
      request that can be answered without a search.
    backend: ollama
    model: qwen3.5:9b-64K
    timeout: 120
    system_prompt: You are a helpful personal assistant. Be concise and practical.
      If you don't know something, say so. Prefer short answers over long ones.
    fallbacks:
    - backend: claude-code
      model: glm-5.1
      timeout: 60
  personal-assistant:
    description: "Do the stuff a personal assistant would do. You have access to these\
      \ tools:\n  playwright-cli · browser control\n  phone-call-message  uses Twilio\
      \ to make calls\n  gws-people  Google contacts\n  gws-sheets-read\n  gws-drive\n\
      \  gws-sheets-append\n  gws-calendar\n  gws-chat \n  gws-docs-write \n  gws-gmail\
      \ \n  gws-gmail-send"
    backend: claude-code
    model: glm-5.1
    timeout: 120
    system_prompt: You are a helpful personal assistant. Be concise and practical.
      If you don't know something, say so. Prefer short answers over long ones.
    fallbacks:
    - backend: ollama
      model: qwen3.5:9b-64K
      timeout: 120
  coder:
    description: 'Software engineering: writing features, debugging, refactoring,
      multi-file edits, git operations, running tests, project scaffolding. Full filesystem
      and shell access.

      '
    backend: claude-code
    model: glm-5.1
    timeout: 600
    system_prompt: 'You are a senior software engineer. Write clean, well-tested code.
      Prefer simple solutions over clever ones. Always explain your changes briefly
      before making them.

      '
    fallbacks:
    - backend: ollama
      model: qwen3.5:9b-64K
      timeout: 120
  architect:
    description: 'High-level software architecture decisions, system design, technology
      selection, code review, and planning.

      '
    backend: claude-code
    model: glm-5.1
    timeout: 600
    system_prompt: 'You are a software architect. Focus on system design, trade-offs,
      and long-term maintainability. Don''t write code unless asked — instead describe
      approaches, compare options, and recommend directions.

      '
    fallbacks:
    - backend: ollama
      model: qwen3.5:9b-64K
      timeout: 120
  local:
    description: Local Ollama agent with file and shell tool access. Good for quick
      file operations, running scripts, and light coding tasks that don't need a full
      cloud agent.
    backend: ollama
    model: gemma4:e4b-64K
    timeout: 300
    system_prompt: You are a helpful assistant with access to filesystem, shell,
      email, calendar, contacts, Drive, Sheets, Docs, and Twilio (phone calls &
      SMS) tools. Use them to complete tasks efficiently. Be concise in your responses.
    tools:
    - bash
    - calendar_agenda
    - calendar_insert
    - docs_write
    - drive_list
    - drive_upload
    - edit_file
    - gmail_forward
    - gmail_read
    - gmail_reply
    - gmail_search
    - gmail_send
    - gmail_triage
    - grep_files
    - list_files
    - people_search
    - read_file
    - sheets_append
    - sheets_read
    - twilio_call
    - twilio_list_calls
    - twilio_list_messages
    - twilio_sms
    - web_extract_pages
    - web_search
    - web_search_news
    - write_file
    options:
      temperature: 0
      top_p: 0.85
      repeat_penalty: 1.15
    fallbacks:
    - backend: ollama
      model: qwen3.5:9b-64K
      timeout: 120
