# Agent definitions for the Gemini Live voice shell
#
# Each agent has a primary config and an optional fallbacks list.
# On failure (non-zero exit, timeout, empty output), the next fallback is tried.
# system_prompt is always inherited from the agent level — fallbacks don't override it.
#
# Env vars in ${VAR} format are resolved at load time. If a var is missing,
# that config entry is marked unavailable and skipped.

agents:
  info:
    description: >
      General knowledge Q&A. Use as the default for any question or
      non-technical request that can be answered without a search.
    backend: ollama
    model: qwen3.5:9b-64K
    timeout: 120
    system_prompt: >
      You are a helpful personal assistant. Be concise and practical.
      If you don't know something, say so. Prefer short answers over long ones.
    fallbacks:
      - backend: claude-code
        model: glm-5.1
        timeout: 120
        api_key: "${ZAI_API_KEY}"
        base_url: "https://api.z.ai/v1"

  personal-assistant:
    description: >
      Do the stuff a personal assistant would do. Help with all the
      google workspace tools - mail, calendar, contacts, etc.
    backend: claude-code
    model: glm-5.1
    timeout: 120
    api_key: "${ZAI_API_KEY}"
    base_url: "https://api.z.ai/v1"
    system_prompt: >
      You are a helpful personal assistant. Be concise and practical.
      If you don't know something, say so. Prefer short answers over long ones.
    fallbacks:
      - backend: ollama
        model: qwen3.5:9b-64K
        timeout: 120

  coder:
    description: >
      Software engineering: writing features, debugging, refactoring,
      multi-file edits, git operations, running tests, project scaffolding.
      Full filesystem and shell access.
    backend: claude-code
    model: glm-5.1
    timeout: 600
    api_key: "${ZAI_API_KEY}"
    base_url: "https://api.z.ai/v1"
    system_prompt: >
      You are a senior software engineer. Write clean, well-tested code.
      Prefer simple solutions over clever ones. Always explain your changes
      briefly before making them.
    fallbacks:
      - backend: ollama
        model: qwen3.5:9b-64K
        timeout: 120

  architect:
    description: >
      High-level software architecture decisions, system design, technology
      selection, code review, and planning.
    backend: claude-code
    model: glm-5.1
    timeout: 600
    api_key: "${ZAI_API_KEY}"
    base_url: "https://api.z.ai/v1"
    system_prompt: >
      You are a software architect. Focus on system design, trade-offs,
      and long-term maintainability. Don't write code unless asked —
      instead describe approaches, compare options, and recommend directions.
    fallbacks:
      - backend: ollama
        model: qwen3.5:9b-64K
        timeout: 120
