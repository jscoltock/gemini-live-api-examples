# Agent definitions for the Gemini Live voice shell
# Each agent is a worker that handles specific types of tasks.
# Gemini's only job is to listen, route work to these agents, and read back results.
#
# ALL agents run async — Gemini gets an immediate tool response and can speak
# while the agent works. Results come back via notification.

agents:
  ollama:
    description: >
      General knowledge Q&A, explanations, analysis, brainstorming, summarization,
      and any reasoning task that doesn't require file access or code execution.
      Fast local model, good for quick answers.
    command: "scripts/ask_ollama '{prompt}'"
    timeout: 120

  claude-code:
    description: >
      Complex coding tasks: writing features, debugging, refactoring, multi-file edits,
      git operations, project scaffolding, running tests, and any work that needs
      file system access or shell commands. Autonomous agent with full tool access.
      Use for anything that requires acting on the local filesystem or codebase.
    command: "/opt/homebrew/bin/claude --dangerously-skip-permissions -p '{prompt}'"
    timeout: 600
